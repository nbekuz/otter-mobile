name: otter_mobile
description: Otter — планировщик задач (Android + Windows)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  flutter_slidable: ^4.0.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  google_sign_in: ^6.3.0
  google_sign_in_dartio: ^0.3.0
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  audioplayers: ^6.4.0
  flutter_svg: ^2.3.0
  lucide_icons_flutter: ^3.1.14+2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/img/
    - assets/legal/
    - .env

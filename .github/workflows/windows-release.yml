name: Windows Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'windows/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/windows-release.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env for asset bundle
        shell: pwsh
        run: |
          if (-not (Test-Path .env)) { Copy-Item .env.example .env }

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib

      - name: Test
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package zip
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches[0].Groups[1].Value.Trim()
          $versionSafe = $version -replace '[^0-9A-Za-z.+_-]', '_'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "dist/otter-windows-x64-$versionSafe.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otter-windows-x64
          path: dist/*.zip
          retention-days: 14
